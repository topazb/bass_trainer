name: CI/CD

# Runs on every push to master
on:
  push:
    branches: [master]

env:
  # Image names in GitHub Container Registry (ghcr.io)
  # Automatically uses the repo owner — no hardcoding needed
  BACKEND_IMAGE:  ghcr.io/${{ github.repository_owner }}/bass-trainer-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/bass-trainer-frontend

# ── Job 1: Build images and push to ghcr.io ──────────────────────────────────
jobs:
  build:
    name: Build & push images
    runs-on: ubuntu-latest

    # Required for GITHUB_TOKEN to push packages
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # automatic, no setup needed

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build backend — uses ./backend/Dockerfile
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          # Layer cache stored in GitHub Actions cache — keeps builds fast and free
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build frontend — uses ./frontend/Dockerfile.prod (multi-stage: Vite build + Nginx)
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: SSH into OCI server and restart with new images ───────────────────
  deploy:
    name: Deploy to server
    needs: build          # only runs if build succeeded
    runs-on: ubuntu-latest

    steps:
      - name: Write SSH key
        run: |
          echo "${{ secrets.OCI_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.OCI_HOST }}
          username: ubuntu
          key_path: /tmp/deploy_key
          script: |
            set -e

            # Pull latest compose file from the repo (public repo, no auth needed)
            git -C ~/bass_trainer pull origin master

            # Pull the freshly built images (packages must be public on ghcr.io)
            docker compose -f ~/bass_trainer/docker-compose.prod.yml pull

            # Restart services
            docker compose -f ~/bass_trainer/docker-compose.prod.yml up -d --remove-orphans

            # Remove old/dangling images to save disk space
            docker image prune -f
