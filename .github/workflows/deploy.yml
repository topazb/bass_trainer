name: CI/CD

on:
  push:
    branches: [master]

env:
  BACKEND_IMAGE:  ghcr.io/${{ github.repository_owner }}/bass-trainer-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/bass-trainer-frontend

# ── Job 1a: Build backend ─────────────────────────────────────────────────────
jobs:
  build-backend:
    name: Build backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

# ── Job 1b: Build frontend (runs in parallel with backend) ────────────────────
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file:    ./frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

# ── Job 2: Deploy — after both builds succeed ─────────────────────────────────
  deploy:
    name: Deploy to server
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest

    steps:
      - name: Write SSH key
        run: |
          echo "${{ secrets.OCI_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.OCI_HOST }}
          username: ubuntu
          key_path: /tmp/deploy_key
          script: |
            set -e
            git -C ~/bass_trainer pull origin master
            docker compose -f ~/bass_trainer/docker-compose.prod.yml pull
            docker compose -f ~/bass_trainer/docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f

# ── Job 3: E2E — smoke-test the live production site after deploy ─────────────
  e2e:
    name: E2E tests (Playwright)
    needs: [deploy]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Wait for production to be healthy
        run: |
          echo "Waiting for production backend..."
          until curl -sf https://bass-trainer.duckdns.org/api/health 2>/dev/null || \
                curl -sf https://bass-trainer.duckdns.org/health 2>/dev/null; do
            sleep 5
          done
          echo "Production is up!"
        timeout-minutes: 3

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install Playwright + deps
        run: npm ci && npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Run E2E tests
        run: npx playwright test
        working-directory: e2e
        env:
          BASE_URL: https://bass-trainer.duckdns.org
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: e2e/playwright-report/
          retention-days: 14
