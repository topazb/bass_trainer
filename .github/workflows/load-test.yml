name: Load Test

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target host (default: production)"
        required: false
        default: "https://bass-trainer.duckdns.org"
      users:
        description: "Peak concurrent users"
        required: false
        default: "20"
      duration:
        description: "Test duration (e.g. 60s, 2m)"
        required: false
        default: "90s"
      spawn_rate:
        description: "Users spawned per second"
        required: false
        default: "5"

jobs:
  load-test:
    name: Locust load test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Locust
        run: pip install -r tests/load/requirements.txt

      - name: Run load test
        run: |
          locust -f tests/load/locustfile.py \
            --headless \
            --host "${{ github.event.inputs.target }}" \
            -u "${{ github.event.inputs.users }}" \
            -r "${{ github.event.inputs.spawn_rate }}" \
            -t "${{ github.event.inputs.duration }}" \
            --html tests/load/report.html \
            --exit-code-on-error 1

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: locust-report-${{ github.sha }}
          path: tests/load/report.html
          retention-days: 30
