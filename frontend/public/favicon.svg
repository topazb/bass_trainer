<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="22" fill="#1a1a1a"/>
  <!-- Bass guitar body -->
  <ellipse cx="50" cy="68" rx="22" ry="20" fill="#e8ff47"/>
  <!-- Waist cut -->
  <ellipse cx="50" cy="55" rx="11" ry="8" fill="#1a1a1a"/>
  <!-- Neck -->
  <rect x="46" y="18" width="8" height="38" rx="3" fill="#c8d830"/>
  <!-- Headstock -->
  <rect x="43" y="12" width="14" height="10" rx="3" fill="#c8d830"/>
  <!-- Tuning pegs -->
  <circle cx="42" cy="14" r="3" fill="#888"/>
  <circle cx="42" cy="20" r="3" fill="#888"/>
  <circle cx="58" cy="14" r="3" fill="#888"/>
  <circle cx="58" cy="20" r="3" fill="#888"/>
  <!-- Strings -->
  <line x1="47" y1="22" x2="47" y2="56" stroke="#aaa" stroke-width="0.8"/>
  <line x1="49" y1="22" x2="49" y2="56" stroke="#aaa" stroke-width="0.8"/>
  <line x1="51" y1="22" x2="51" y2="56" stroke="#aaa" stroke-width="0.8"/>
  <line x1="53" y1="22" x2="53" y2="56" stroke="#aaa" stroke-width="0.8"/>
  <!-- Fret markers -->
  <circle cx="50" cy="30" r="1.5" fill="#1a1a1a"/>
  <circle cx="50" cy="38" r="1.5" fill="#1a1a1a"/>
  <circle cx="50" cy="46" r="1.5" fill="#1a1a1a"/>
  <!-- Pickup -->
  <rect x="40" y="60" width="20" height="5" rx="2" fill="#1a1a1a"/>
  <!-- Bridge -->
  <rect x="42" y="72" width="16" height="3" rx="1" fill="#888"/>
</svg>
