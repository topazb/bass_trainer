services:

  backend:
    # On the server: CI/CD pulls this pre-built image from ghcr.io
    # Locally:       run `docker compose -f docker-compose.prod.yml build` to build and tag it
    image: ghcr.io/topazb/bass-trainer-backend:latest
    build: ./backend
    container_name: bass_backend
    ports:
      - "8000:8000"
    volumes:
      - bass_data:/data          # SQLite database — persists across deploys
      - ./audio:/app/audio:ro   # music tracks — mount your audio folder here
    environment:
      - DATABASE_URL=sqlite:////data/bass_trainer.db
      - AUDIO_DIR=/app/audio
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - BACKEND_URL=${BACKEND_URL:-http://localhost:8000}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost}
      - ADMIN_SECRET=${ADMIN_SECRET:-change_me}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    restart: unless-stopped

  frontend:
    # Multi-stage build: Vite build + Nginx serving + envsubst for BACKEND_URL
    image: ghcr.io/topazb/bass-trainer-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: bass_frontend
    ports:
      - "80:80"
    environment:
      # Internal Docker network URL — Nginx proxies API calls here
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  bass_data:
